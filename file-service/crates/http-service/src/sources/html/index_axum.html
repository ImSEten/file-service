<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件服务器</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .table-container {
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
            background-color: #fff;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #2b4057;
            color: #fff;
        }

        thead th {
            padding: 12px;
            text-align: left;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        thead th:hover {
            background-color: #1e2e3d;
        }

        .sort-indicator {
            margin-left: 5px;
            font-size: 0.8em;
        }

        tbody tr:nth-child(even) {
            background-color: #f8f8f8;
        }

        tbody tr:hover {
            background-color: #f1f1f1;
        }

        tbody td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        a {
            color: #007bff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .file-path {
            color: black;
            text-decoration: none;
        }

        .file-path:hover {
            text-decoration: none;
        }

        .download-btn, .delete-btn, .open-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .download-btn {
            background-color: #28a745;
            color: #fff;
        }

        .download-btn:hover {
            background-color: #218838;
        }

        .delete-btn {
            background-color: #dc3545;
            color: #fff;
        }

        .delete-btn:hover {
            background-color: #c82333;
        }

        .open-btn {
            background-color: #007bff;
            color: #fff;
        }

        .open-btn:hover {
            background-color: #0056b3;
        }

        .refresh-btn, .new-folder-btn, .rename-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .refresh-btn {
            background-color: #17a2b8;
            color: #fff;
        }

        .refresh-btn:hover {
            background-color: #138496;
        }

        .new-folder-btn {
            background-color: #6f42c1;
            color: #fff;
        }

        .new-folder-btn:hover {
            background-color: #5a32a3;
        }

        .rename-btn {
            background-color: #ffc107;
            color: #212529;
        }

        .rename-btn:hover {
            background-color: #e0a800;
        }

        .upload-container {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-container input[type="file"] {
            display: none;
        }

        .upload-container button {
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .upload-container button:hover {
            background-color: #0056b3;
        }

        /* 上传进度窗口样式 */
        .upload-progress-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            min-width: 400px;
            max-width: 600px;
        }

        .upload-progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #2b4057;
            color: #fff;
            border-radius: 10px 10px 0 0;
        }

        .upload-progress-header h3 {
            margin: 0;
            font-size: 16px;
        }

        .header-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .close-progress-btn, .minimize-progress-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .close-progress-btn:hover, .minimize-progress-btn:hover {
            color: #ccc;
        }

        /* 最小化状态样式 */
        .upload-progress-modal.minimized {
            top: auto !important;
            left: auto !important;
            bottom: 20px;
            right: 20px;
            transform: none !important;
            min-width: 250px;
            max-width: 300px;
        }

        .upload-progress-modal.minimized .upload-progress-header {
            padding: 8px 12px;
            border-radius: 10px 10px 0 0;
            cursor: move;
        }

        .upload-progress-modal.minimized .upload-progress-header h3 {
            font-size: 14px;
        }

        .upload-progress-modal.minimized .upload-progress-content {
            padding: 0;
        }

        .upload-progress-modal.minimized .upload-progress-list {
            max-height: 150px;
            padding: 8px;
        }

        .upload-progress-modal.minimized .upload-progress-item {
            padding: 6px 8px;
            border-bottom: 1px solid #eee;
        }

        .upload-progress-modal.minimized .upload-file-name {
            max-width: 60%;
            font-size: 12px;
        }

        .upload-progress-modal.minimized .upload-file-status {
            font-size: 11px;
        }

        .upload-progress-modal.minimized .upload-progress-bar-container {
            height: 5px;
        }

        .upload-progress-modal.minimized .upload-progress-details {
            font-size: 10px;
        }

        /* 隐藏已完成的项目（最小化状态） */
        .upload-progress-modal.minimized .upload-progress-item.complete {
            display: none;
        }

        /* 最小化时的标题 */
        .upload-progress-modal.minimized .upload-progress-header h3.minimized-title {
            display: block;
        }

        .upload-progress-modal:not(.minimized) .upload-progress-header h3.minimized-title {
            display: none;
        }

        .upload-progress-modal.minimized .upload-progress-header h3.normal-title {
            display: none;
        }

        .upload-progress-modal:not(.minimized) .upload-progress-header h3.minimized-title {
            display: none;
        }

        .upload-progress-content {
            padding: 0;
        }

        .upload-progress-list {
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
        }

        .upload-progress-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .upload-progress-item:last-child {
            border-bottom: none;
        }

        .upload-file-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .upload-file-name {
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }

        .upload-file-status {
            font-size: 12px;
            color: #666;
        }

        .upload-progress-bar-container {
            width: 100%;
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .upload-progress-bar {
            height: 100%;
            background-color: #28a745;
            transition: width 0.3s ease;
            width: 0%;
        }

        .upload-progress-details {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
        }

        .upload-speed {
            color: #007bff;
        }

        .upload-complete {
            color: #28a745;
        }

        .upload-error {
            color: #dc3545;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .batch-operations {
            display: flex;
            gap: 10px;
        }

        .batch-btn {
            padding: 8px 16px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .batch-btn:hover {
            background-color: #545b62;
        }

        .batch-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .checkbox-cell {
            text-align: center;
            width: 40px;
        }

        /* 新建文件夹模态框样式 */
        .modal-dialog {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            z-index: 1001;
            min-width: 300px;
            max-width: 400px;
        }

        .modal-dialog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #2b4057;
            color: #fff;
            border-radius: 10px 10px 0 0;
        }

        .modal-dialog-header h3 {
            margin: 0;
            font-size: 16px;
        }

        .modal-dialog-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .modal-dialog-body {
            padding: 20px;
        }

        .modal-dialog-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 15px 20px;
            border-top: 1px solid #eee;
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .modal-btn-cancel {
            padding: 8px 16px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .modal-btn-cancel:hover {
            background-color: #5a6268;
        }

        .modal-btn-confirm {
            padding: 8px 16px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .modal-btn-confirm:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <!-- 上传按钮和批量操作按钮 -->
    <div class="upload-container">
        <input type="file" id="fileInput" multiple style="display:none;" />
        <button class="btn btn-primary" id="uploadButton">上传文件</button>
        <button class="refresh-btn" id="refreshButton">刷新列表</button>
        <button class="new-folder-btn" id="newFolderButton">新建文件夹</button>
        <div class="batch-operations">
            <button class="batch-btn" id="batchDownloadBtn" disabled>批量下载</button>
            <button class="batch-btn" id="batchDeleteBtn" disabled>批量删除</button>
        </div>
    </div>

    <!-- 新建文件夹模态框 -->
    <div class="modal-overlay" id="newFolderOverlay"></div>
    <div class="modal-dialog" id="newFolderDialog">
        <div class="modal-dialog-header">
            <h3>新建文件夹</h3>
            <button class="modal-dialog-close" id="closeNewFolderBtn">×</button>
        </div>
        <div class="modal-dialog-body">
            <input type="text" class="modal-input" id="newFolderName" placeholder="请输入文件夹名称" />
        </div>
        <div class="modal-dialog-footer">
            <button class="modal-btn-cancel" id="cancelNewFolderBtn">取消</button>
            <button class="modal-btn-confirm" id="confirmNewFolderBtn">确定</button>
        </div>
    </div>

    <!-- 重命名模态框 -->
    <div class="modal-overlay" id="renameOverlay"></div>
    <div class="modal-dialog" id="renameDialog">
        <div class="modal-dialog-header">
            <h3>重命名</h3>
            <button class="modal-dialog-close" id="closeRenameBtn">×</button>
        </div>
        <div class="modal-dialog-body">
            <input type="text" class="modal-input" id="renameInput" placeholder="请输入新名称" />
        </div>
        <div class="modal-dialog-footer">
            <button class="modal-btn-cancel" id="cancelRenameBtn">取消</button>
            <button class="modal-btn-confirm" id="confirmRenameBtn">确定</button>
        </div>
    </div>

    <!-- 上传进度窗口 -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="upload-progress-modal" id="uploadProgressModal">
        <div class="upload-progress-header">
            <h3 class="normal-title">上传进度</h3>
            <h3 class="minimized-title" id="minimizedTitle">上传中...</h3>
            <div class="header-buttons">
                <button class="minimize-progress-btn" id="minimizeProgressBtn" title="最小化">−</button>
                <button class="close-progress-btn" id="closeProgressBtn" title="关闭">×</button>
            </div>
        </div>
        <div class="upload-progress-content">
            <div class="upload-progress-list" id="uploadProgressList">
                <!-- 动态生成的上传进度项 -->
            </div>
        </div>
    </div>

    <!-- 文件列表表格 -->
    <div class="table-container" id="data-table">
        <table>
            <thead>
                <tr>
                    <th class="checkbox-cell"><input type="checkbox" id="selectAll"></th>
                    <th data-sort="size">大小 <span class="sort-indicator"></span></th>
                    <th data-sort="name">名称 <span class="sort-indicator"></span></th>
                    <th data-sort="path">路径 <span class="sort-indicator"></span></th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script>
        // 获取当前路径
        let currentPath = '/';
        let selectedItems = new Set(); // 存储选中的项目路径
        let currentData = []; // 存储当前目录数据
        let currentSortColumn = 'name'; // 当前排序列，默认按名称排序
        let currentSortOrder = 'asc'; // 当前排序顺序，默认升序

        // 更新URL而不需要重新加载页面
        function updateURL(path) {
            history.pushState({}, '', `/file${path}`);
            fetchAndDisplayDirectory(path);
        }

        // 初始加载时获取根目录内容
        window.addEventListener('load', () => {
            const path = window.location.pathname.replace('/file', '') || '/';
            updateURL(path);
        });

        // 监听popstate事件，处理浏览器的前进/后退按钮
        window.addEventListener('popstate', (event) => {
            const path = window.location.pathname.replace('/file', '');
            fetchAndDisplayDirectory(path);
        });

        // 进入目录时更新URL
        function enterDirectory(dir) {
            currentPath = dir;
            updateURL(dir);
        }

        // 将字节转换为人类可读格式
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';

            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));

            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 更新批量操作按钮状态
        function updateBatchButtons() {
            const batchDownloadBtn = document.getElementById('batchDownloadBtn');
            const batchDeleteBtn = document.getElementById('batchDeleteBtn');
            const hasSelection = selectedItems.size > 0;
            batchDownloadBtn.disabled = !hasSelection;
            batchDeleteBtn.disabled = !hasSelection;
        }

        // 处理复选框变化
        function handleCheckboxChange(itemPath, isChecked) {
            if (isChecked) {
                selectedItems.add(itemPath);
            } else {
                selectedItems.delete(itemPath);
            }
            updateBatchButtons();
        }

        // 全选/取消全选
        document.getElementById('selectAll').addEventListener('change', function(e) {
            const checkboxes = document.querySelectorAll('tbody input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                checkbox.checked = e.target.checked;
                handleCheckboxChange(checkbox.dataset.path, e.target.checked);
            });
        });

        // 排序函数
        function sortData(data, column, order) {
            return data.sort((a, b) => {
                let aValue, bValue;
                
                switch(column) {
                    case 'size':
                        aValue = a.size;
                        bValue = b.size;
                        break;
                    case 'name':
                        aValue = a.name.toLowerCase();
                        bValue = b.name.toLowerCase();
                        break;
                    case 'path':
                        aValue = a.path.toLowerCase();
                        bValue = b.path.toLowerCase();
                        break;
                    default:
                        return 0;
                }
                
                if (aValue < bValue) return order === 'asc' ? -1 : 1;
                if (aValue > bValue) return order === 'asc' ? 1 : -1;
                return 0;
            });
        }

        // 更新排序指示器
        function updateSortIndicators() {
            // 清除所有排序指示器
            document.querySelectorAll('.sort-indicator').forEach(indicator => {
                indicator.textContent = '';
            });
            
            // 设置当前排序列的指示器
            if (currentSortColumn) {
                const currentHeader = document.querySelector(`th[data-sort="${currentSortColumn}"]`);
                if (currentHeader) {
                    const indicator = currentHeader.querySelector('.sort-indicator');
                    indicator.textContent = currentSortOrder === 'asc' ? '↑' : '↓';
                }
            }
        }

        // 显示数据到表格
        function displayData(data) {
            const tbody = document.querySelector('#data-table tbody');
            tbody.innerHTML = ''; // 清空现有内容
            selectedItems.clear(); // 清空选中项
            updateBatchButtons(); // 更新按钮状态

            data.forEach(item => {
                const tr = document.createElement('tr');

                // 创建复选框列
                const checkboxTd = document.createElement('td');
                checkboxTd.className = 'checkbox-cell';
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.dataset.path = item.path;
                checkbox.addEventListener('change', (e) => {
                    handleCheckboxChange(item.path, e.target.checked);
                });
                checkboxTd.appendChild(checkbox);
                tr.appendChild(checkboxTd);

                // 创建 size 列
                const sizeTd = document.createElement('td');
                sizeTd.textContent = formatBytes(item.size);
                tr.appendChild(sizeTd);

                const nameTd = document.createElement('td');
                nameTd.textContent = item.name;
                tr.appendChild(nameTd);

                const pathTd = document.createElement('td');
                const pathLink = document.createElement('a');
                if (item.is_dir) {
                    pathLink.textContent = item.path + '/';
                    pathLink.addEventListener('click', (event) => {
                        event.preventDefault();
                        enterDirectory(item.path);
                    });
                    pathLink.style.cursor = 'pointer';
                } else {
                    pathLink.textContent = item.path;
                    pathLink.className = 'file-path';
                }
                pathTd.appendChild(pathLink);
                tr.appendChild(pathTd);

                // 操作列：根据类型显示打开或下载按钮
                const actionTd = document.createElement('td');
                if (item.is_dir) {
                    const openButton = document.createElement('button');
                    openButton.textContent = "打开";
                    openButton.className = "open-btn";
                    openButton.addEventListener('click', (event) => {
                        enterDirectory(item.path);
                    });
                    actionTd.appendChild(openButton);
                } else {
                    const downloadButton = document.createElement('button');
                    downloadButton.textContent = "下载";
                    downloadButton.className = "download-btn";
                    downloadButton.addEventListener('click', (event) => downloadFile(item.path));
                    actionTd.appendChild(downloadButton);
                }

                // 重命名按钮
                const renameButton = document.createElement('button');
                renameButton.textContent = "重命名";
                renameButton.className = "rename-btn";
                renameButton.addEventListener('click', () => showRenameDialog(item.path, item.is_dir));
                actionTd.appendChild(renameButton);

                // 删除按钮
                const deleteButton = document.createElement('button');
                deleteButton.textContent = "删除";
                deleteButton.className = "delete-btn";
                deleteButton.addEventListener('click', () => deleteItem(item.path, item.is_dir));
                actionTd.appendChild(deleteButton);

                tr.appendChild(actionTd);
                tbody.appendChild(tr);
            });
        }

        function fetchAndDisplayDirectory(dir) {
            const fullURL = window.location.origin; // 获取当前域名和端口
            const listURL = `${fullURL}/list${dir === '/' ? '//' : dir}`;
            fetch(listURL)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok ' + response.statusText);
                    }
                    return response.json();
                })
                .then(data => {
                    currentData = data; // 保存数据
                    // 如果有排序设置，则排序数据
                    if (currentSortColumn) {
                        currentData = sortData(currentData, currentSortColumn, currentSortOrder);
                    }
                    displayData(currentData);
                    updateSortIndicators();
                })
                .catch(error => {
                    console.error('There was a problem with your fetch operation:', error);
                });
        }

        // 添加排序事件监听器
        document.querySelectorAll('th[data-sort]').forEach(header => {
            header.addEventListener('click', () => {
                const column = header.getAttribute('data-sort');
                
                // 如果点击的是当前排序列，则切换排序顺序
                if (currentSortColumn === column) {
                    currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
                } else {
                    // 否则设置新的排序列，默认升序
                    currentSortColumn = column;
                    currentSortOrder = 'asc';
                }
                
                // 排序并显示数据
                currentData = sortData(currentData, currentSortColumn, currentSortOrder);
                displayData(currentData);
                updateSortIndicators();
            });
        });

        // 删除项目（文件或目录）
        async function deleteItem(path, isDir) {
            const confirmDelete = confirm(`确定要删除 "${path}" 吗？此操作不可逆！`);
            if (!confirmDelete) return;

            const fullPath = path.startsWith('/') ? path : `/${path}`;
            try {
                const response = await fetch(`${window.location.origin}/delete${fullPath}`, {
                    method: 'DELETE',
                });

                if (response.ok) {
                    alert('删除成功！');
                    const currentPath = window.location.pathname.replace('/file', '') || '/';
                    fetchAndDisplayDirectory(currentPath);
                } else {
                    const errorMessage = await response.text();
                    alert(`删除失败：${errorMessage}`);
                }
            } catch (error) {
                console.error('删除过程中发生错误:', error);
                alert('删除过程中发生错误，请检查控制台日志。');
            }
        }

        // 批量删除
        document.getElementById('batchDeleteBtn').addEventListener('click', async () => {
            if (selectedItems.size === 0) return;
            const confirmDelete = confirm(`确定要删除选中的 ${selectedItems.size} 个项目吗？此操作不可逆！`);
            if (!confirmDelete) return;

            for (const path of selectedItems) {
                const fullPath = path.startsWith('/') ? path : `/${path}`;
                try {
                    const response = await fetch(`${window.location.origin}/delete${fullPath}`, {
                        method: 'DELETE',
                    });
                    if (!response.ok) {
                        const errorMessage = await response.text();
                        console.error(`删除失败: ${errorMessage}`);
                    }
                } catch (error) {
                    console.error('删除过程中发生错误:', error);
                }
            }
            alert('批量删除完成！');
            // 清空选中项并重置全选按钮
            selectedItems.clear();
            updateBatchButtons();
            const selectAllCheckbox = document.getElementById('selectAll');
            if (selectAllCheckbox) {
                selectAllCheckbox.checked = false;
            }
            const currentPath = window.location.pathname.replace('/file', '') || '/';
            fetchAndDisplayDirectory(currentPath);
        });

        // 下载文件
        async function downloadFile(dir) {
            const fullURL = window.location.origin;
            const downloadLink = `${fullURL}/download${dir}`;
            const a = document.createElement('a');
            a.href = downloadLink;
            a.download = dir.split('/').pop();
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // 批量下载
        document.getElementById('batchDownloadBtn').addEventListener('click', () => {
            if (selectedItems.size === 0) return;
            selectedItems.forEach(path => {
                if (!path.endsWith('/')) { // 只下载文件，不下载文件夹
                    downloadFile(path);
                }
            });
            // 清空选中项并重置全选按钮
            selectedItems.clear();
            updateBatchButtons();
            const selectAllCheckbox = document.getElementById('selectAll');
            if (selectAllCheckbox) {
                selectAllCheckbox.checked = false;
            }
        });

        // 设置每个分块的大小（例如：16MB）
        const CHUNK_SIZE = 16 * 1024 * 1024;

        // 上传进度跟踪
        const uploadProgressMap = new Map(); // 存储每个文件的上传进度信息
        let uploadIdCounter = 0; // 上传 ID 计数器

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 格式化速度
        function formatSpeed(bytesPerSecond) {
            if (bytesPerSecond === 0) return '0 B/s';
            const k = 1024;
            const sizes = ['B/s', 'KB/s', 'MB/s', 'GB/s'];
            const i = Math.floor(Math.log(bytesPerSecond) / Math.log(k));
            return parseFloat((bytesPerSecond / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 显示上传进度窗口（非模态模式，允许用户继续操作）
        function showUploadProgressModal() {
            document.getElementById('uploadProgressModal').style.display = 'block';
            // 不显示遮罩层，允许用户继续操作页面
        }

        // 隐藏上传进度窗口
        function hideUploadProgressModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('uploadProgressModal').style.display = 'none';
        }

        // 检查是否有文件正在上传
        function hasUploadingFiles() {
            for (const [uploadId, uploadInfo] of uploadProgressMap.entries()) {
                const statusSpan = document.getElementById(`status-${uploadId}`);
                if (statusSpan && !statusSpan.textContent.includes('已完成') && !statusSpan.textContent.includes('失败')) {
                    return true;
                }
            }
            return false;
        }

        // 获取正在上传的文件数量
        function getUploadingCount() {
            let count = 0;
            for (const [uploadId, uploadInfo] of uploadProgressMap.entries()) {
                const statusSpan = document.getElementById(`status-${uploadId}`);
                if (statusSpan && !statusSpan.textContent.includes('已完成') && !statusSpan.textContent.includes('失败')) {
                    count++;
                }
            }
            return count;
        }

        // 关闭进度窗口（带确认）
        function tryCloseProgressModal() {
            if (hasUploadingFiles()) {
                const uploadingCount = getUploadingCount();
                if (confirm(`有 ${uploadingCount} 个文件正在上传，关闭将终止上传。确定要终止上传吗？`)) {
                    hideUploadProgressModal();
                }
            } else {
                hideUploadProgressModal();
            }
        }

        // 最小化/恢复进度窗口
        let isMinimized = false;
        function toggleMinimizeProgressModal() {
            const modal = document.getElementById('uploadProgressModal');
            const minimizeBtn = document.getElementById('minimizeProgressBtn');
            isMinimized = !isMinimized;
            
            if (isMinimized) {
                modal.classList.add('minimized');
                minimizeBtn.textContent = '□';
                minimizeBtn.title = '恢复';
                updateMinimizedTitle();
            } else {
                modal.classList.remove('minimized');
                minimizeBtn.textContent = '−';
                minimizeBtn.title = '最小化';
            }
        }

        // 更新最小化时的标题
        function updateMinimizedTitle() {
            const minimizedTitle = document.getElementById('minimizedTitle');
            let uploadingCount = 0;
            for (const [uploadId, uploadInfo] of uploadProgressMap.entries()) {
                const statusSpan = document.getElementById(`status-${uploadId}`);
                if (statusSpan && !statusSpan.textContent.includes('已完成') && !statusSpan.textContent.includes('失败')) {
                    uploadingCount++;
                }
            }
            if (uploadingCount > 0) {
                minimizedTitle.textContent = `${uploadingCount} 个文件正在上传...`;
            } else {
                minimizedTitle.textContent = '上传完成';
            }
        }

        // 清空上传进度列表
        function clearUploadProgressList() {
            const progressList = document.getElementById('uploadProgressList');
            progressList.innerHTML = '';
            uploadProgressMap.clear();
        }

        // 添加上传进度项到列表
        function addUploadProgressItem(uploadId, fileName, fileSize) {
            const progressList = document.getElementById('uploadProgressList');
            const itemDiv = document.createElement('div');
            itemDiv.className = 'upload-progress-item';
            itemDiv.id = `upload-item-${uploadId}`;
            itemDiv.innerHTML = `
                <div class="upload-file-info">
                    <span class="upload-file-name" title="${fileName}">${fileName}</span>
                    <span class="upload-file-status" id="status-${uploadId}">等待中...</span>
                </div>
                <div class="upload-progress-bar-container">
                    <div class="upload-progress-bar" id="progress-bar-${uploadId}" style="width: 0%"></div>
                </div>
                <div class="upload-progress-details">
                    <span id="progress-text-${uploadId}">0%</span>
                    <span class="upload-speed" id="speed-${uploadId}">-- B/s</span>
                </div>
            `;
            progressList.appendChild(itemDiv);
            // 滚动到最新项
            progressList.scrollTop = progressList.scrollHeight;
        }

        // 更新上传进度
        function updateUploadProgress(uploadId, uploadedBytes, totalBytes, speed) {
            const percentage = Math.round((uploadedBytes / totalBytes) * 100);
            const progressBar = document.getElementById(`progress-bar-${uploadId}`);
            const progressText = document.getElementById(`progress-text-${uploadId}`);
            const speedSpan = document.getElementById(`speed-${uploadId}`);
            
            if (progressBar) {
                progressBar.style.width = percentage + '%';
            }
            if (progressText) {
                progressText.textContent = percentage + '%';
            }
            if (speedSpan) {
                speedSpan.textContent = formatSpeed(speed);
            }
        }

        // 标记上传完成
        function markUploadComplete(uploadId) {
            const statusSpan = document.getElementById(`status-${uploadId}`);
            const speedSpan = document.getElementById(`speed-${uploadId}`);
            const itemDiv = document.getElementById(`upload-item-${uploadId}`);
            if (statusSpan) {
                statusSpan.textContent = '已完成';
                statusSpan.className = 'upload-file-status upload-complete';
            }
            if (speedSpan) {
                speedSpan.className = 'upload-speed upload-complete';
            }
            if (itemDiv) {
                itemDiv.classList.add('complete');
            }
            // 如果是最小化状态，更新标题
            if (isMinimized) {
                updateMinimizedTitle();
            }
        }

        // 标记上传失败
        function markUploadError(uploadId, errorMessage) {
            const statusSpan = document.getElementById(`status-${uploadId}`);
            const speedSpan = document.getElementById(`speed-${uploadId}`);
            if (statusSpan) {
                statusSpan.textContent = '失败';
                statusSpan.className = 'upload-file-status upload-error';
            }
            if (speedSpan) {
                speedSpan.className = 'upload-speed upload-error';
            }
        }

        // 获取上传按钮和文件输入元素
        const uploadButton = document.getElementById('uploadButton');
        const fileInput = document.getElementById('fileInput');
        const closeProgressBtn = document.getElementById('closeProgressBtn');

        // 关闭进度窗口（带确认）
        closeProgressBtn.addEventListener('click', tryCloseProgressModal);

        // 最小化按钮事件
        document.getElementById('minimizeProgressBtn').addEventListener('click', toggleMinimizeProgressModal);

        // 封装后的文件上传函数
        async function uploadFileWithChunks(file, currentPath) {
            const uploadId = ++uploadIdCounter;
            const fileNameBase = file.name;
            const fileSize = file.size;
            const totalChunks = Math.ceil(fileSize / CHUNK_SIZE);
            
            // 初始化上传进度信息
            const uploadInfo = {
                id: uploadId,
                name: fileNameBase,
                size: fileSize,
                uploadedBytes: 0,
                startTime: null,
                lastUpdateTime: null
            };
            uploadProgressMap.set(uploadId, uploadInfo);
            
            // 显示进度窗口并添加进度项
            showUploadProgressModal();
            addUploadProgressItem(uploadId, fileNameBase, fileSize);
            
            let start = 0;
            let end = CHUNK_SIZE;
            let chunkIndex = 0;
            let allChunksUploadedSuccessfully = true;

            while (start < fileSize) {
                const chunk = file.slice(start, end);
                const formData = new FormData();
                const fileName = chunkIndex === 0 ? fileNameBase : `${fileNameBase}.${chunkIndex}`;
                formData.append('file', chunk, fileName);

                try {
                    const chunkStartTime = Date.now();
                    
                    if (!uploadInfo.startTime) {
                        uploadInfo.startTime = chunkStartTime;
                    }

                    const response = await fetch(`${window.location.origin}/upload${currentPath === '/' ? '//' : currentPath}`, {
                        method: 'POST',
                        body: formData,
                    });

                    const chunkEndTime = Date.now();
                    const chunkUploadTime = (chunkEndTime - chunkStartTime) / 1000; // 秒
                    
                    if (!response.ok) {
                        console.error('response error:', response);
                        throw new Error('上传分块失败');
                    } else {
                        console.log(`分块 ${chunkIndex}/${totalChunks} 上传成功`);
                        
                        // 更新已上传字节数
                        uploadInfo.uploadedBytes += chunk.size;
                        uploadInfo.lastUpdateTime = chunkEndTime;
                        
                        // 计算速度
                        const elapsedTime = (chunkEndTime - uploadInfo.startTime) / 1000; // 秒
                        const speed = elapsedTime > 0 ? uploadInfo.uploadedBytes / elapsedTime : 0;
                        
                        // 更新进度显示
                        updateUploadProgress(uploadId, uploadInfo.uploadedBytes, fileSize, speed);
                        
                        await sendMergeRequest(fileNameBase, currentPath, chunkIndex);
                    }
                } catch (error) {
                    console.error('上传过程中发生错误:', error);
                    markUploadError(uploadId, error.message);
                    allChunksUploadedSuccessfully = false;
                    break;
                }

                chunkIndex++;
                start = end;
                end = start + CHUNK_SIZE;
            }

            if (allChunksUploadedSuccessfully) {
                markUploadComplete(uploadId);
                fetchAndDisplayDirectory(currentPath);
            }
        }

        // 发送合并请求的辅助函数
        async function sendMergeRequest(fileNameBase, currentPath, chunkIndex) {
            console.debug("sendMergeRequest")
            try {
                const mergeResponse = await fetch(`${window.location.origin}/merge/${encodeURIComponent(`${currentPath}/${fileNameBase}`)}`, {
                    method: 'POST'
                });

                if (mergeResponse.ok) {
                    console.log(`分块 ${chunkIndex + 1} 合并成功`);
                } else {
                    console.error(`分块 ${chunkIndex + 1} 合并失败`);
                }
            } catch (error) {
                console.error('合并过程中发生错误:', error);
            }
        }

        // 添加上传按钮的点击事件
        uploadButton.addEventListener('click', () => {
            fileInput.click();
        });

        // 监听文件选择事件
        fileInput.addEventListener('change', (event) => {
            const files = event.target.files;
            if (files.length > 0) {
                // 清空之前的上传进度，只显示当前批次的文件
                clearUploadProgressList();
                
                const currentPath = window.location.pathname.replace('/file', '') || '/';
                for (let file of files) {
                    uploadFileWithChunks(file, currentPath);
                }
            }
        });

        // ========== 刷新列表功能 ==========
        document.getElementById('refreshButton').addEventListener('click', () => {
            const currentPath = window.location.pathname.replace('/file', '') || '/';
            fetchAndDisplayDirectory(currentPath);
        });

        // ========== 新建文件夹功能 ==========
        let newFolderOverlay = document.getElementById('newFolderOverlay');
        let newFolderDialog = document.getElementById('newFolderDialog');
        let closeNewFolderBtn = document.getElementById('closeNewFolderBtn');
        let cancelNewFolderBtn = document.getElementById('cancelNewFolderBtn');
        let confirmNewFolderBtn = document.getElementById('confirmNewFolderBtn');
        let newFolderNameInput = document.getElementById('newFolderName');

        document.getElementById('newFolderButton').addEventListener('click', () => {
            newFolderNameInput.value = '';
            newFolderOverlay.style.display = 'block';
            newFolderDialog.style.display = 'block';
            newFolderNameInput.focus();
        });

        function closeNewFolderDialog() {
            newFolderOverlay.style.display = 'none';
            newFolderDialog.style.display = 'none';
        }

        closeNewFolderBtn.addEventListener('click', closeNewFolderDialog);
        cancelNewFolderBtn.addEventListener('click', closeNewFolderDialog);

        confirmNewFolderBtn.addEventListener('click', async () => {
            const folderName = newFolderNameInput.value.trim();
            if (!folderName) {
                alert('请输入文件夹名称');
                return;
            }

            // 验证文件夹名称是否合法
            if (folderName.includes('/') || folderName.includes('\\') || folderName === '..') {
                alert('文件夹名称包含非法字符');
                return;
            }

            const currentPath = window.location.pathname.replace('/file', '') || '/';
            const fullPath = currentPath === '/' ? `/${folderName}` : `${currentPath}/${folderName}`;
            
            try {
                const response = await fetch(`${window.location.origin}/upload${fullPath}`, {
                    method: 'POST',
                    body: new FormData(),
                });

                if (response.ok) {
                    alert('文件夹创建成功！');
                    closeNewFolderDialog();
                    fetchAndDisplayDirectory(currentPath);
                } else {
                    const errorMessage = await response.text();
                    alert(`创建失败：${errorMessage}`);
                }
            } catch (error) {
                console.error('创建文件夹过程中发生错误:', error);
                alert('创建文件夹过程中发生错误，请检查控制台日志。');
            }
        });

        // 按回车键确认创建文件夹
        newFolderNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                confirmNewFolderBtn.click();
            }
        });

        // ========== 重命名功能 ==========
        let renameOverlay = document.getElementById('renameOverlay');
        let renameDialog = document.getElementById('renameDialog');
        let closeRenameBtn = document.getElementById('closeRenameBtn');
        let cancelRenameBtn = document.getElementById('cancelRenameBtn');
        let confirmRenameBtn = document.getElementById('confirmRenameBtn');
        let renameInput = document.getElementById('renameInput');
        let currentRenamePath = null;

        function showRenameDialog(path, isDir) {
            currentRenamePath = path;
            // 从路径中提取文件名/文件夹名
            const parts = path.split('/').filter(p => p);
            const name = parts[parts.length - 1] || path;
            renameInput.value = name;
            renameOverlay.style.display = 'block';
            renameDialog.style.display = 'block';
            renameInput.focus();
            renameInput.select();
        }

        function closeRenameDialog() {
            renameOverlay.style.display = 'none';
            renameDialog.style.display = 'none';
            currentRenamePath = null;
        }

        closeRenameBtn.addEventListener('click', closeRenameDialog);
        cancelRenameBtn.addEventListener('click', closeRenameDialog);

        confirmRenameBtn.addEventListener('click', async () => {
            const newName = renameInput.value.trim();
            if (!newName) {
                alert('请输入新名称');
                return;
            }

            // 验证新名称是否合法
            if (newName.includes('/') || newName.includes('\\') || newName === '..') {
                alert('名称包含非法字符');
                return;
            }

            if (!currentRenamePath) {
                alert('无效的操作');
                return;
            }

            try {
                const response = await fetch(`${window.location.origin}/rename${currentRenamePath}?new_name=${encodeURIComponent(newName)}`, {
                    method: 'PUT',
                });

                if (response.ok) {
                    alert('重命名成功！');
                    closeRenameDialog();
                    const currentPath = window.location.pathname.replace('/file', '') || '/';
                    fetchAndDisplayDirectory(currentPath);
                } else {
                    const errorMessage = await response.text();
                    alert(`重命名失败：${errorMessage}`);
                }
            } catch (error) {
                console.error('重命名过程中发生错误:', error);
                alert('重命名过程中发生错误，请检查控制台日志。');
            }
        });

        // 按回车键确认重命名
        renameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                confirmRenameBtn.click();
            }
        });
    </script>
</body>
</html>
